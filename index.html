<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEWSLINE — 最新ニュース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&family=DM+Serif+Display:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:     #0d0d0d;
    --paper:   #f5f0e8;
    --cream:   #ede8dc;
    --accent:  #c0392b;
    --muted:   #7a7060;
    --rule:    #c8bfaa;
    --col: 680px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── MASTHEAD ── */
  header {
    border-bottom: 3px double var(--ink);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    background: var(--paper);
  }
  .masthead-top {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 14px 0 6px;
    border-bottom: 1px solid var(--rule);
  }
  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .site-title span { color: var(--accent); font-style: italic; }
  .meta-bar {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }
  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0;
  }

  /* ── CATEGORY TABS ── */
  .tabs {
    display: flex; gap: 0;
    overflow-x: auto;
    padding: 10px 24px 0;
    background: var(--paper);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid var(--rule);
    border-bottom: none;
    cursor: pointer;
    background: var(--cream);
    color: var(--muted);
    white-space: nowrap;
    transition: all .15s;
    margin-right: 4px;
  }
  .tab.active, .tab:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* ── LAYOUT ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 28px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #27ae60;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.3; }
  }
  .refresh-btn {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .refresh-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ── NEWS GRID ── */
  #news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0;
  }

  /* ── CARD ── */
  .card {
    border: 1px solid var(--rule);
    margin: -1px 0 0 -1px;
    padding: 22px 20px 18px;
    background: var(--paper);
    transition: background .15s;
    animation: fadeIn .35s ease both;
    display: flex; flex-direction: column;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .card:hover { background: var(--cream); }

  .card-source {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .source-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    background: var(--ink);
    color: var(--paper);
  }
  .cat-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 1px 6px;
  }
  .card-time {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    margin-left: auto;
  }

  .card-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 10px;
    flex: 1;
  }
  .card-title a {
    color: inherit;
    text-decoration: none;
  }
  .card-title a:hover { color: var(--accent); }

  .card-desc {
    font-size: 0.78rem;
    line-height: 1.7;
    color: #444;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 2px;
    align-self: flex-start;
    transition: color .15s, border-color .15s;
  }
  .card-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── HERO CARD (first item) ── */
  .card.hero {
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 28px;
    padding: 28px;
    background: var(--ink);
    color: var(--paper);
  }
  .card.hero .card-title { font-size: 1.4rem; color: var(--paper); }
  .card.hero .card-title a { color: var(--paper); }
  .card.hero .card-title a:hover { color: #f0c040; }
  .card.hero .source-badge { background: var(--paper); color: var(--ink); }
  .card.hero .cat-badge { border-color: #f0c040; color: #f0c040; }
  .card.hero .card-desc { color: #bbb; font-size: 0.83rem; -webkit-line-clamp: 4; }
  .card.hero .card-link { color: #888; border-color: #555; }
  .card.hero .card-time { color: #888; }
  .card.hero .card-link:hover { color: #f0c040; border-color: #f0c040; }
  .hero-left { flex: 1.5; }
  .hero-right { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .hero-num {
    font-family: 'DM Serif Display', serif;
    font-size: 6rem;
    line-height: 1;
    color: #222;
    user-select: none;
  }

  /* ── LOADING / EMPTY ── */
  .loader {
    text-align: center;
    padding: 80px 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .loader::after {
    content: '';
    display: block;
    width: 40px; height: 2px;
    background: var(--ink);
    margin: 16px auto 0;
    animation: load 1.2s ease-in-out infinite alternate;
  }
  @keyframes load { from { width:20px; } to { width:80px; } }

  /* ── FOOTER ── */
  footer {
    border-top: 3px double var(--ink);
    padding: 18px 24px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .card.hero { flex-direction: column; }
    .hero-num { font-size: 3.5rem; }
    #news-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="masthead-top">
    <div class="site-title">NEWS<span>LINE</span></div>
    <div class="meta-bar">
      <div id="updated-time">読込中...</div>
      <div id="article-count">— 件</div>
    </div>
  </div>
  <div class="tagline">RSS AUTO-AGGREGATOR — 完全無料・自動更新</div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-cat="all">すべて</div>
</div>

<main>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="status-text">ニュースを読み込んでいます...</span>
    <button class="refresh-btn" onclick="loadNews()">↻ 更新</button>
  </div>
  <div id="news-grid">
    <div class="loader">LOADING</div>
  </div>
</main>

<footer>
  NEWSLINE — GitHub Pages + GitHub Actions + RSS Feeds — すべて無料
</footer>

<script>
  let allNews = [];
  let currentCat = 'all';

  function formatDate(str) {
    if (!str) return '';
    try {
      const d = new Date(str);
      if (isNaN(d)) return str.slice(0, 16);
      return d.toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return ''; }
  }

  function stripHtml(html) {
    if (!html) return '';
    return html.replace(/<[^>]*>/g, '').replace(/&[a-z]+;/gi, ' ').trim();
  }

  function renderCards(items) {
    const grid = document.getElementById('news-grid');
    if (!items.length) {
      grid.innerHTML = '<div class="loader">記事なし</div>';
      return;
    }

    grid.innerHTML = items.map((item, i) => {
      const desc = stripHtml(item.description);
      const time = formatDate(item.pubDate);

      if (i === 0) {
        return `
        <div class="card hero" style="animation-delay:0s">
          <div class="hero-left">
            <div class="card-source">
              <span class="source-badge">${item.source}</span>
              <span class="cat-badge">${item.category}</span>
              <span class="card-time">${time}</span>
            </div>
            <div class="card-title"><a href="${item.link}" target="_blank" rel="noopener">${item.title}</a></div>
            ${desc ? `<div class="card-desc">${desc}</div>` : ''}
            <a class="card-link" href="${item.link}" target="_blank" rel="noopener">記事を読む →</a>
          </div>
          <div class="hero-right">
            <div class="hero-num">01</div>
          </div>
        </div>`;
      }

      return `
      <div class="card" style="animation-delay:${Math.min(i*0.04,0.5)}s">
        <div class="card-source">
          <span class="source-badge">${item.source}</span>
          <span class="cat-badge">${item.category}</span>
          <span class="card-time">${time}</span>
        </div>
        <div class="card-title"><a href="${item.link}" target="_blank" rel="noopener">${item.title}</a></div>
        ${desc ? `<div class="card-desc">${desc}</div>` : ''}
        <a class="card-link" href="${item.link}" target="_blank" rel="noopener">記事を読む →</a>
      </div>`;
    }).join('');
  }

  function buildTabs(news) {
    const cats = ['all', ...new Set(news.map(n => n.category))];
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = cats.map(c =>
      `<div class="tab${c === currentCat ? ' active' : ''}" data-cat="${c}">${c === 'all' ? 'すべて' : c}</div>`
    ).join('');
    tabsEl.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        currentCat = t.dataset.cat;
        tabsEl.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const filtered = currentCat === 'all' ? allNews : allNews.filter(n => n.category === currentCat);
        renderCards(filtered);
      });
    });
  }

  async function loadNews() {
    document.getElementById('status-text').textContent = '更新中...';
    document.getElementById('news-grid').innerHTML = '<div class="loader">LOADING</div>';
    try {
      const res = await fetch('news.json?t=' + Date.now());
      if (!res.ok) throw new Error('news.json not found');
      const data = await res.json();
      allNews = data.news || [];
      document.getElementById('updated-time').textContent = '更新: ' + (data.updated || '不明');
      document.getElementById('article-count').textContent = allNews.length + ' 件';
      document.getElementById('status-text').textContent = `${allNews.length}件の記事を表示中`;
      buildTabs(allNews);
      renderCards(allNews);
    } catch (e) {
      document.getElementById('status-text').textContent = 'ローカル確認中（GitHub Pages上で動作します）';
      document.getElementById('news-grid').innerHTML = `
        <div class="loader" style="padding:60px 20px;text-align:left;max-width:500px">
          <strong style="font-size:0.8rem">📋 セットアップ手順</strong><br><br>
          1. このファイルをGitHubリポジトリに push<br>
          2. <code>python fetch_news.py</code> を実行 → news.json 生成<br>
          3. GitHub Pages を有効化（Settings → Pages）<br>
          4. GitHub Actions が3時間ごとに自動更新<br><br>
          <span style="color:#c0392b">news.json が見つかりません（ローカル環境）</span>
        </div>`;
    }
  }

  loadNews();
</script>
</body>
</html>
